name: Deploy Radar Site

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm build

      - name: Prepare SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$SERVER_SSH_KEY_B64" | base64 --decode > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${SERVER_PORT:-22}" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Sync files to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_TARGET_DIR: ${{ secrets.SERVER_TARGET_DIR }}
        run: |
          rsync -avz --delete --exclude latest.json -e "ssh -p ${SERVER_PORT:-22}" out/ "${SERVER_USER}@${SERVER_HOST}:${SERVER_TARGET_DIR}/"
          rsync -avz -e "ssh -p ${SERVER_PORT:-22}" \
            public/competitors.json \
            public/china-admin-divisions.json \
            "${SERVER_USER}@${SERVER_HOST}:${SERVER_TARGET_DIR}/"

      - name: Sync backend and build scripts
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          rsync -avz -e "ssh -p ${SERVER_PORT:-22}" server/ "${SERVER_USER}@${SERVER_HOST}:/home/ubuntu/yantai-radar-site/server/"
          rsync -avz -e "ssh -p ${SERVER_PORT:-22}" scripts/build-sales-intel.mjs "${SERVER_USER}@${SERVER_HOST}:/home/ubuntu/yantai-radar-site/scripts/"

      - name: Refresh server runtime
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          ssh -p "${SERVER_PORT:-22}" "${SERVER_USER}@${SERVER_HOST}" <<'EOF'
          set -euo pipefail
          mkdir -p /home/ubuntu/yantai-radar-site/scripts /home/ubuntu/yantai-radar-site/server/data
          cd /home/ubuntu/yantai-radar-site/server
          npm install --omit=dev

          if [ -f /var/www/qn-message.com/latest.json ] || [ -f /var/www/qn-message.com/recruitment-leads-aggregate.json ]; then
            node /home/ubuntu/yantai-radar-site/scripts/build-sales-intel.mjs \
              --radar /var/www/qn-message.com/latest.json \
              --recruitment /var/www/qn-message.com/recruitment-leads-aggregate.json \
              --output /var/www/qn-message.com/sales-intel.json
          fi

          if [ -f /var/www/qn-message.com/competitors.json ]; then
            node /home/ubuntu/yantai-radar-site/server/import-document.mjs \
              --key competitors \
              --input /var/www/qn-message.com/competitors.json \
              --source github-actions-deploy
          fi

          if [ -f /var/www/qn-message.com/china-admin-divisions.json ]; then
            node /home/ubuntu/yantai-radar-site/server/import-document.mjs \
              --key adminDivisions \
              --input /var/www/qn-message.com/china-admin-divisions.json \
              --source github-actions-deploy
          fi

          if [ -f /var/www/qn-message.com/sales-intel.json ]; then
            node /home/ubuntu/yantai-radar-site/server/import-document.mjs \
              --key salesIntel \
              --input /var/www/qn-message.com/sales-intel.json \
              --source github-actions-deploy
          fi

          sudo systemctl restart radar-api.service
          EOF
